<!DOCTYPE html>
<html lang="th">
<head>

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        ขอใบเสนอราคา | MT Solar
    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body class="quote-page">

<!-- ================= HEADER ================= -->

<header class="quote-header">

    <a
        href="index.html"
        class="back-home"
    >

        <i class="fa-solid fa-arrow-left"></i>

        กลับหน้าหลัก

    </a>

    <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRKFZV3K1mGXwmHiNTJX7v_PrFZcQFk6GxbWPOaEkffBOL95gAO3wGazdy5&s=10"
        alt="MT Solar"
    >

</header>


<!-- ================= FORM ================= -->

<section class="quote-section">

    <div class="quote-container">

        <div class="quote-left">

            <span>

                MT SOLAR ENERGY (Thailand)

            </span>

            <h1>

                ขอใบเสนอราคา
                <br>
                สำหรับสั่งซื้อสินค้า

            </h1>

            <p>

                กรุณากรอกข้อมูลด้านล่าง
                ทีมงาน MT Solar
                จะติดต่อกลับภายใน 24 ชั่วโมง

            </p>

            <div class="contact-info">

                <div>

                    <i class="fab fa-facebook-f"></i>

                    <span>

                        MT Solar

                    </span>

                </div>

                <div>

                    <i class="fab fa-line"></i>

                    <span>

                        @177hqpww

                    </span>

                </div>

                <div>

                    <i class="fa-solid fa-phone"></i>

                    <span>

                        063-060-3628

                    </span>

                </div>

                <div>

                    <i class="fa-solid fa-location-dot"></i>

                    <a
                        href="https://maps.app.goo.gl/5JQqjaddWdydkn3E6"
                        target="_blank"
                    >

                        Google Map

                    </a>

                </div>

            </div>

        </div>


        <!-- FORM -->

        <div class="quote-form-box">

            <form id="quoteForm">

                <div class="form-group">

                    <label>

                        ชื่อ - นามสกุล

                    </label>

                    <input
                        type="text"
                        name="name"
                        placeholder="กรอกชื่อของคุณ"
                        required
                    >

                </div>


                <div class="form-group">

                    <label>

                        เบอร์โทรศัพท์

                    </label>

                    <input
                        type="tel"
                        name="phone"
                        placeholder="08X-XXX-XXXX"
                        required
                    >

                </div>


                <div class="form-group">

                    <label>

                        Line ID

                    </label>

                    <input
                        type="text"
                        name="line"
                        placeholder="@example"
                    >

                </div>


                <div class="form-group">

                    <label>

                        อีเมล

                    </label>

                    <input
                        type="email"
                        name="email"
                        placeholder="example@email.com"
                    >

                </div>


                <div class="form-group">

                    <label>

                        ประเภทงาน

                    </label>

                    <select name="jobType">

                        <option>

                            บ้านพักอาศัย

                        </option>

                        <option>

                            อาคารพาณิชย์

                        </option>

                        <option>

                            โรงงานอุตสาหกรรม

                        </option>

                        <option>

                            หน่วยงานราชการ

                        </option>

                    </select>

                </div>


                <div class="form-group">

                    <label>

                        จังหวัด

                    </label>

                    <input
                        type="text"
                        name="province"
                        placeholder="เชียงใหม่"
                    >

                </div>


                <div class="form-group full-width">

                    <label>

                        รายละเอียดเพิ่มเติม

                    </label>

                    <textarea
                        name="detail"
                        rows="5"
                        placeholder="ระบุรายละเอียดที่ต้องการ..."
                    ></textarea>

                </div>


                <button
                    type="submit"
                    class="submit-btn"
                >

                    ส่งข้อมูลเพื่อขอใบเสนอราคา

                </button>

            </form>

        </div>

    </div>

</section>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbwf_Qp0Gb-Oqenyngf_H2QolkGUK7V_JNIAzqfakOmCIi5xH64Q93W8TQkpQlp0fvo/exec";

const form = document.getElementById("quoteForm");

form.addEventListener("submit", e => {

    e.preventDefault();

    fetch(scriptURL, {
        method: "POST",
        body: new FormData(form)
    })

    .then(() => {

        alert("ส่งข้อมูลสำเร็จ!");

        form.reset();

    })

    .catch(error => {

        alert("เกิดข้อผิดพลาด");

        console.error(error);

    });

});

</script>

<script src="script.js"></script>

</body>
</html>
